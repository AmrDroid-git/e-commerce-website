security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    access_denied_url: /error/403

    providers:
        users:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|uploads)/
            security: false
        main:
            lazy: true
            provider: users
            custom_authenticator: App\Security\AuthAuthenticator
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/manageusers, roles: ROLE_ADMIN }
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/panier, roles: ROLE_USER }
        - { path: ^/checkout, roles: ROLE_USER }
        - { path: ^/payment, roles: ROLE_USER }
        - { path: ^/favorites, roles: ROLE_USER }
        - { path: ^/commandes, roles: ROLE_USER }
        - { path: ^/commande/delete, roles: ROLE_USER }
        - { path: ^/comment, roles: ROLE_USER }
        - { path: ^/rating/upsert, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

